<!doctype html>
<meta charset="utf-8">
<title>Extract Rendered Target Assets</title>
<script>
const target = '../assets/rendered-style-target.png';
const frogSource = '../assets/rendered-frog-source.png';

const assets = [
  { name: 'car-red', source: target, crop: [220, 60, 190, 140], size: [256, 144], key: 'dark' },
  { name: 'car-blue', source: target, crop: [35, 60, 190, 140], size: [224, 144], key: 'dark' },
  { name: 'truck-purple', source: target, crop: [1085, 315, 400, 170], size: [352, 152], key: 'dark' },
  { name: 'log', source: target, crop: [445, 500, 215, 88], size: [384, 136], key: 'dark' },
  { name: 'turtle', source: target, crop: [35, 610, 280, 170], size: [192, 144], key: 'dark' },
  { name: 'turtle-submerged', source: target, crop: [590, 610, 390, 165], size: [192, 144], key: 'dark' },
  { name: 'lily-home', source: target, crop: [1110, 600, 390, 240], size: [320, 168], key: 'dark' },
  { name: 'fly', source: target, crop: [35, 790, 200, 190], size: [128, 128], key: 'dark' },
  { name: 'grass-tile', source: target, crop: [235, 805, 300, 185], size: [160, 160], key: 'dark' },
  { name: 'road-tile', source: target, crop: [595, 805, 330, 185], size: [320, 80], key: 'dark' },
  { name: 'river-tile', source: target, crop: [860, 805, 330, 185], size: [320, 80], key: 'dark' },
  { name: 'frog', source: frogSource, crop: [255, 180, 735, 780], size: [192, 192], key: 'magenta' }
];

function blobToDataURL(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

async function loadImage(src) {
  if (location.protocol === 'file:') {
    throw new Error('Please open this tool through a local server, not file://. Example: python3 -m http.server 4173, then visit http://127.0.0.1:4173/tools/extract-target-assets.html');
  }
  const response = await fetch(src + '?v=' + Date.now(), { cache: 'no-store' });
  if (!response.ok) throw new Error('Failed to load ' + src + ': HTTP ' + response.status);
  const dataURL = await blobToDataURL(await response.blob());
  return new Promise((resolve, reject) => {
    const image = new Image();
    image.onload = () => resolve(image);
    image.onerror = reject;
    image.src = dataURL;
  });
}

function alphaKey(imageData, mode) {
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    const r = data[i], g = data[i + 1], b = data[i + 2];
    let alpha = 255;
    if (mode === 'magenta') {
      const dist = Math.hypot(r - 255, g - 0, b - 255);
      if (dist < 35) alpha = 0;
      else if (dist < 95) alpha = Math.round((dist - 35) / 60 * 255);
      if (alpha < 255) {
        data[i] = 0;
        data[i + 1] = 0;
        data[i + 2] = 0;
      }
    } else if (mode === 'dark') {
      const max = Math.max(r, g, b);
      const sat = max - Math.min(r, g, b);
      if (max < 34) alpha = 0;
      else if (max < 58 && sat < 22) alpha = Math.round((max - 34) / 24 * 180);
    }
    data[i + 3] = Math.min(data[i + 3], alpha);
  }
}

async function renderAsset(asset) {
  const [sx, sy, sw, sh] = asset.crop;
  const [dw, dh] = asset.size;
  const image = await loadImage(asset.source);
  const canvas = document.createElement('canvas');
  canvas.width = dw;
  canvas.height = dh;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.clearRect(0, 0, dw, dh);
  ctx.drawImage(image, sx, sy, sw, sh, 0, 0, dw, dh);
  const imageData = ctx.getImageData(0, 0, dw, dh);
  alphaKey(imageData, asset.key);
  ctx.putImageData(imageData, 0, 0);
  return canvas.toDataURL('image/png');
}

async function run() {
  const outputs = document.getElementById('outputs');
  document.getElementById('status').textContent = 'extracting';
  for (const asset of assets) {
    const dataURL = await renderAsset(asset);
    const label = document.createElement('label');
    label.textContent = asset.name;
    label.style.display = 'block';
    const textarea = document.createElement('textarea');
    textarea.id = 'out-' + asset.name;
    textarea.value = dataURL;
    textarea.style.width = '100%';
    textarea.style.height = '4em';
    outputs.appendChild(label);
    outputs.appendChild(textarea);
  }
  document.getElementById('status').textContent = 'done';
}

document.addEventListener('DOMContentLoaded', () => {
  run().catch(error => {
    document.getElementById('status').textContent = 'error: ' + error.message;
  });
});
</script>
<body style="font-family:sans-serif;background:#111;color:#fff">
  <h1>Extract Rendered Target Assets</h1>
  <p>Open via a local server, not <code>file://</code>, so canvas pixel extraction is allowed.</p>
  <p id="status">waiting</p>
  <div id="outputs"></div>
</body>
