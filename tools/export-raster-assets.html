<!doctype html>
<meta charset="utf-8">
<title>Export Frog Assets</title>
<script>
const assets = [
  ['frog', '../assets/frog.svg', 384, 384],
  ['car-red', '../assets/car-red.svg', 512, 288],
  ['car-blue', '../assets/car-blue.svg', 448, 288],
  ['truck-purple', '../assets/truck-purple.svg', 704, 304],
  ['log', '../assets/log.svg', 768, 272],
  ['turtle', '../assets/turtle.svg', 384, 288],
  ['turtle-submerged', '../assets/turtle-submerged.svg', 384, 288],
  ['lily-home', '../assets/lily-home.svg', 640, 336],
  ['fly', '../assets/fly.svg', 256, 256],
  ['grass-tile', '../assets/grass-tile.svg', 320, 320],
  ['road-tile', '../assets/road-tile.svg', 640, 160],
  ['river-tile', '../assets/river-tile.svg', 640, 160]
];

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = url;
  });
}

async function exportAsset([name, src, width, height]) {
  const img = await loadImage(src + '?v=' + Date.now());
  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.clearRect(0, 0, width, height);
  ctx.drawImage(img, 0, 0, width, height);
  return { name, dataURL: canvas.toDataURL('image/png') };
}

window.exportAll = async function() {
  const result = {};
  for (const asset of assets) {
    const item = await exportAsset(asset);
    result[item.name] = item.dataURL;
  }
  window.__exportedAssets = result;
  const list = document.getElementById('outputs');
  list.innerHTML = '';
  for (const [name, dataURL] of Object.entries(result)) {
    const label = document.createElement('label');
    label.textContent = name;
    label.style.display = 'block';
    const textarea = document.createElement('textarea');
    textarea.id = 'out-' + name;
    textarea.value = dataURL;
    textarea.style.width = '100%';
    textarea.style.height = '4em';
    list.appendChild(label);
    list.appendChild(textarea);
  }
  document.getElementById('status').textContent = 'done';
  document.getElementById('output').value = JSON.stringify(result);
  return result;
};

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('status').textContent = 'exporting';
  window.exportAll().catch(error => {
    document.getElementById('status').textContent = 'error: ' + error.message;
  });
});
</script>
<body style="font-family:sans-serif;background:#111;color:#fff">
  <h1>Export Frog Assets</h1>
  <p id="status">waiting</p>
  <textarea id="output" style="width:100%;height:60vh"></textarea>
  <div id="outputs"></div>
</body>
